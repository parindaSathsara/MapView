    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      display: flex;
      height: 100vh;
      background: #f0f2f5;
      color: #1a1a2e;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 380px;

      display: flex;
      flex-direction: column;
      background: #fff;
      border-right: 1px solid #e0e0e0;
      z-index: 10;
    }

    .sidebar-header {
      padding: 20px 22px 14px;
      background: linear-gradient(135deg, #0d6efd 0%, #0b5ed7 100%);
      color: #fff;
    }

    .sidebar-header h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .sidebar-header p {
      font-size: 13px;
      margin-top: 4px;
      opacity: 0.85;
    }

    /* Filters */
    .filters {
      padding: 12px 22px;
      display: flex;
      gap: 8px;
      border-bottom: 1px solid #e8e8e8;
      flex-wrap: wrap;
    }

    .search-box {
      flex: 1;
      min-width: 160px;
      padding: 8px 12px;
      font-size: 13px;
      border: 1px solid #d0d0d0;
      border-radius: 6px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-box:focus { border-color: #0d6efd; }

    .filter-select {
      padding: 8px 10px;
      font-size: 13px;
      border: 1px solid #d0d0d0;
      border-radius: 6px;
      background: #fff;
      outline: none;
      cursor: pointer;
    }

    .filter-select:focus { border-color: #0d6efd; }

    /* Stats bar */
    .stats-bar {
      display: flex;
      gap: 10px;
      padding: 10px 22px;
      border-bottom: 1px solid #e8e8e8;
      font-size: 12px;
      color: #555;
    }

    .stat-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #f0f4ff;
      padding: 4px 10px;
      border-radius: 20px;
      font-weight: 600;
      color: #0d6efd;
    }

    .stat-badge .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    /* Hotel list */
    .hotel-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
    }

    .hotel-list::-webkit-scrollbar { width: 6px; }
    .hotel-list::-webkit-scrollbar-thumb { background: #c0c0c0; border-radius: 3px; }

    .hotel-card {
      padding: 12px 22px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.15s, border-color 0.15s;
    }

    .hotel-card:hover {
      background: #f5f8ff;
      border-left-color: #0d6efd;
    }

    .hotel-card.active {
      background: #e8f0fe;
      border-left-color: #0d6efd;
    }

    .hotel-card .hotel-name {
      font-size: 14px;
      font-weight: 600;
      color: #1a1a2e;
      margin-bottom: 3px;
    }

    .hotel-card .hotel-meta {
      font-size: 12px;
      color: #666;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .hotel-card .hotel-meta .cat-badge {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      font-weight: 600;
      color: #d4a017;
      font-size: 11px;
    }

    .hotel-card .hotel-meta .area-tag {
      background: #eee;
      padding: 1px 7px;
      border-radius: 3px;
      font-size: 11px;
      color: #555;
    }

    .hotel-card .sic-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 3px;
      text-transform: uppercase;
    }

    .hotel-card .sic-no  { background: #f8d7da; color: #721c24; }

    .hotel-card .hotel-address {
      font-size: 11px;
      color: #888;
      margin-top: 4px;
      line-height: 1.4;
    }

    .no-results {
      padding: 40px 22px;
      text-align: center;
      color: #888;
      font-size: 14px;
    }

    /* ── Map ── */
    #map {

      height: 100%;
    }

      color: #0d6efd;

    }

    /* Responsive */
    @media (max-width: 800px) {

  </style>

// Color map by category
const CAT_COLORS = {
  "3":  { bg: "#4285F4", glyph: "3★" },
  "3+": { bg: "#34A853", glyph: "3+" },
  "4":  { bg: "#FBBC05", glyph: "4★" },
  "5":  { bg: "#EA4335", glyph: "5★" }
};

let map, markers = [], infoWindow, activeCardIdx = null;

function initMap() {
  // Center on Phu Quoc
  const center = { lat: 10.210, lng: 103.960 };

  map = new google.maps.Map(document.getElementById("map"), {
    center,
    zoom: 13,
    mapTypeId: "roadmap",
    styles: [
      { featureType: "poi", stylers: [{ visibility: "simplified" }] },
      { featureType: "transit", stylers: [{ visibility: "off" }] }
    ],
    mapTypeControl: true,
    mapTypeControlOptions: {
      style: google.maps.MapTypeControlStyle.HORIZONTAL_BAR,
      position: google.maps.ControlPosition.TOP_RIGHT
    },
    fullscreenControl: true,
    streetViewControl: false
  });

  infoWindow = new google.maps.InfoWindow();

  // Create markers
  HOTELS.forEach((h, i) => {
    if (!h.lat || !h.lng) return;
    const catInfo = CAT_COLORS[h.cat] || CAT_COLORS["3"];

    const marker = new google.maps.Marker({
      position: { lat: h.lat, lng: h.lng },
      map,
      title: h.name,
      icon: {
        path: google.maps.SymbolPath.CIRCLE,
        fillColor: catInfo.bg,
        fillOpacity: 0.9,
        strokeColor: "#fff",
        strokeWeight: 2,
        scale: 10
      },
      label: {
        text: h.cat,
        color: "#fff",
        fontSize: "9px",
        fontWeight: "bold"
      }
    });

    marker.hotelIndex = i;

    marker.addListener("click", () => {
      openInfoWindow(i);
      highlightCard(i);
    });

    markers.push(marker);
  });

  // Populate area filter
  const areas = [...new Set(HOTELS.map(h => h.area).filter(a => a && a !== "-"))].sort();
  const areaFilter = document.getElementById("areaFilter");
  areas.forEach(a => {
    const opt = document.createElement("option");
    opt.value = a;
    opt.textContent = a;
    areaFilter.appendChild(opt);
  });

  document.getElementById("totalCount").textContent = HOTELS.length;

  renderList();
  bindFilters();
}

function getStars(cat) {
  const n = parseInt(cat) || 3;
  return "★".repeat(n);
}

function openInfoWindow(idx) {
  const h = HOTELS[idx];
  const stars = getStars(h.cat);
  const sicLabel = h.sic.toLowerCase() === "yes"
    ? '<span style="color:#155724;font-weight:600">✓ SIC Pick Up</span>'
    : '<span style="color:#721c24;font-weight:600">✗ No SIC Pick Up</span>';

  const directionsUrl = `https://www.google.com/maps/dir/?api=1&destination=${h.lat},${h.lng}`;

  const content = `
    <div class="iw-container">
      <h3>${escapeHtml(h.name)}</h3>
      <div class="iw-stars">${stars} (${escapeHtml(h.cat)}-Star)</div>
      <div class="iw-row"><span class="iw-label">Area:</span> ${escapeHtml(h.area)}</div>
      <div class="iw-row"><span class="iw-label">Address:</span> ${escapeHtml(h.address)}</div>
      <div class="iw-row">${sicLabel}</div>
      <a class="iw-directions" href="${directionsUrl}" target="_blank" rel="noopener">📍 Get Directions</a>
    </div>
  `;

  infoWindow.setContent(content);
  infoWindow.open(map, markers[idx]);
  map.panTo(markers[idx].getPosition());
}

function highlightCard(idx) {
  document.querySelectorAll(".hotel-card.active").forEach(c => c.classList.remove("active"));
  const card = document.querySelector(`.hotel-card[data-index="${idx}"]`);
  if (card) {
    card.classList.add("active");
    card.scrollIntoView({ behavior: "smooth", block: "nearest" });
  }
  activeCardIdx = idx;
}

function renderList() {
  const query = document.getElementById("searchInput").value.toLowerCase();
  const catVal = document.getElementById("catFilter").value;
  const areaVal = document.getElementById("areaFilter").value.toLowerCase();
  const list = document.getElementById("hotelList");

  let html = "";
  let count = 0;

  HOTELS.forEach((h, i) => {
    // Filter
    const matchSearch = !query
      || h.name.toLowerCase().includes(query)
      || h.address.toLowerCase().includes(query);
    const matchCat = !catVal || h.cat === catVal;
    const matchArea = !areaVal || h.area.toLowerCase() === areaVal;

    const visible = matchSearch && matchCat && matchArea;

    // Toggle marker
    if (markers[i]) markers[i].setVisible(visible);

    if (!visible) return;
    count++;

    const sicClass = h.sic.toLowerCase() === "yes" ? "sic-yes" : "sic-no";
    const sicText = h.sic.toLowerCase() === "yes" ? "SIC ✓" : "No SIC";

    html += `
      <div class="hotel-card${activeCardIdx === i ? ' active' : ''}" data-index="${i}" onclick="onCardClick(${i})">
        <div class="hotel-name">${escapeHtml(h.name)}</div>
        <div class="hotel-meta">
          <span class="cat-badge">${getStars(h.cat)} ${escapeHtml(h.cat)}</span>
          <span class="area-tag">${escapeHtml(h.area)}</span>
          <span class="sic-badge ${sicClass}">${sicText}</span>
        </div>
        <div class="hotel-address">${escapeHtml(h.address)}</div>
      </div>
    `;
  });

  if (count === 0) {
    html = '<div class="no-results">No hotels match your filters.</div>';
  }

  list.innerHTML = html;
  document.getElementById("visibleCount").textContent = count;
}

function onCardClick(idx) {
  openInfoWindow(idx);
  highlightCard(idx);
  map.setZoom(16);
}

function bindFilters() {
  document.getElementById("searchInput").addEventListener("input", renderList);
  document.getElementById("catFilter").addEventListener("change", renderList);
  document.getElementById("areaFilter").addEventListener("change", renderList);
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}
</script>

  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA0Z8_GzoG68yaI8pAEkA_03Ig1N-6qki8&callback=initMap"
  async defer>
</script>
